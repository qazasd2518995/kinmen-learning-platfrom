<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選擇學習內容 - 金門語教材</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 30px 0;
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #8892b0;
      font-size: 1rem;
    }

    .instructions {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      border-left: 4px solid #FFD700;
    }

    .instructions h3 {
      margin-bottom: 10px;
      color: #FFD700;
    }

    .units-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .unit-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      position: relative;
    }

    .unit-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-5px);
    }

    .unit-card.selected {
      border-color: #FFD700;
      background: rgba(255,215,0,0.1);
    }

    .unit-card .checkbox {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 24px;
      height: 24px;
      border: 2px solid #8892b0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .unit-card.selected .checkbox {
      background: #FFD700;
      border-color: #FFD700;
    }

    .unit-card.selected .checkbox::after {
      content: '✓';
      color: #1a1a2e;
      font-weight: bold;
    }

    .unit-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .unit-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .unit-description {
      color: #8892b0;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .unit-meta {
      margin-top: 15px;
      display: flex;
      gap: 15px;
      font-size: 0.85rem;
      color: #64748b;
    }

    .unit-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      position: sticky;
      bottom: 20px;
    }

    .selection-count {
      color: #8892b0;
    }

    .selection-count strong {
      color: #FFD700;
    }

    .btn-group {
      display: flex;
      gap: 15px;
    }

    .btn {
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-cancel {
      background: transparent;
      color: #8892b0;
      border: 1px solid #8892b0;
    }

    .btn-cancel:hover {
      background: rgba(255,255,255,0.05);
    }

    .btn-submit {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      color: #1a1a2e;
    }

    .btn-submit:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 15px rgba(255,215,0,0.3);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Loading overlay */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-content {
      text-align: center;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ---- Responsive Design ---- */

    /* Tablet: 1024px and below */
    @media (max-width: 1024px) {
      .container {
        max-width: 100%;
        padding: 0 10px;
      }

      header {
        padding: 24px 0;
      }

      header h1 {
        font-size: 1.8rem;
      }

      .units-grid {
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }

      .unit-card {
        padding: 20px;
      }

      .unit-icon {
        font-size: 2.5rem;
        margin-bottom: 12px;
      }

      .actions {
        padding: 16px;
      }

      .btn {
        padding: 10px 24px;
      }
    }

    /* Mobile: 768px and below */
    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      header {
        padding: 18px 0;
      }

      header h1 {
        font-size: 1.5rem;
      }

      header p {
        font-size: 0.9rem;
      }

      .instructions {
        padding: 16px;
        margin-bottom: 20px;
        font-size: 0.9rem;
      }

      .units-grid {
        grid-template-columns: 1fr;
        gap: 14px;
        margin-bottom: 20px;
      }

      .unit-card {
        padding: 18px;
      }

      .unit-card:hover {
        transform: none;
      }

      .unit-icon {
        font-size: 2.2rem;
        margin-bottom: 10px;
      }

      .unit-title {
        font-size: 1.1rem;
      }

      .unit-description {
        font-size: 0.85rem;
      }

      .unit-meta {
        margin-top: 12px;
        gap: 10px;
        font-size: 0.8rem;
      }

      .actions {
        flex-direction: column;
        gap: 14px;
        text-align: center;
        padding: 16px;
        bottom: 12px;
      }

      .btn-group {
        width: 100%;
        justify-content: center;
      }

      .btn {
        padding: 10px 20px;
        font-size: 0.95rem;
      }
    }

    /* Small mobile: 480px and below */
    @media (max-width: 480px) {
      body {
        padding: 8px;
      }

      header {
        padding: 14px 0;
      }

      header h1 {
        font-size: 1.25rem;
      }

      header p {
        font-size: 0.85rem;
      }

      .instructions {
        padding: 12px;
        margin-bottom: 16px;
        border-radius: 8px;
        font-size: 0.85rem;
      }

      .instructions h3 {
        font-size: 0.95rem;
      }

      .units-grid {
        gap: 10px;
        margin-bottom: 16px;
      }

      .unit-card {
        padding: 14px;
        border-radius: 12px;
      }

      .unit-card .checkbox {
        top: 10px;
        right: 10px;
        width: 22px;
        height: 22px;
      }

      .unit-icon {
        font-size: 2rem;
        margin-bottom: 8px;
      }

      .unit-title {
        font-size: 1rem;
        margin-bottom: 8px;
        padding-right: 30px;
      }

      .unit-description {
        font-size: 0.82rem;
        line-height: 1.4;
      }

      .unit-meta {
        flex-wrap: wrap;
        margin-top: 10px;
        gap: 8px;
        font-size: 0.78rem;
      }

      .actions {
        flex-direction: column;
        gap: 12px;
        padding: 12px;
        border-radius: 8px;
        bottom: 8px;
      }

      .selection-count {
        font-size: 0.9rem;
      }

      .btn-group {
        width: 100%;
        flex-direction: column;
        gap: 10px;
      }

      .btn {
        width: 100%;
        padding: 12px 16px;
        font-size: 0.9rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏝️ 金門語教材</h1>
      <p>選擇要新增到課程的學習內容</p>
    </header>

    <div class="instructions">
      <h3>📋 操作說明</h3>
      <p>點選下方的單元卡片來選擇要新增的內容。您可以選擇多個單元。選擇完成後，點擊「確認新增」將內容加入課程。</p>
    </div>

    <div class="units-grid" id="unitsGrid">
      <!-- 單元卡片將由 JavaScript 動態生成 -->
    </div>

    <div class="actions">
      <div class="selection-count">
        已選擇 <strong id="selectedCount">0</strong> 個單元
      </div>
      <div class="btn-group">
        <button class="btn btn-cancel" onclick="handleCancel()">取消</button>
        <button class="btn btn-submit" id="submitBtn" disabled onclick="handleSubmit()">確認新增</button>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>正在處理...</p>
    </div>
  </div>

  <script>
    // 單元資料
    const units = [
      {
        id: 'vocabulary',
        number: 1,
        icon: '🍎',
        title: '認識蔬果',
        description: '學習 26 個金門語蔬果詞彙，包含字卡、聽力練習和配對遊戲。',
        duration: '20 分鐘',
        activities: 4
      },
      {
        id: 'dialogue',
        number: 2,
        icon: '💬',
        title: '市場對話',
        description: '學習 7 個市場情境對話，掌握詢價、殺價等實用對話技巧。',
        duration: '25 分鐘',
        activities: 7
      },
      {
        id: 'practice',
        number: 3,
        icon: '✍️',
        title: '實戰練習',
        description: '綜合詞彙和對話練習，模擬真實購物情境進行互動練習。',
        duration: '30 分鐘',
        activities: 5
      },
      {
        id: 'games',
        number: 4,
        icon: '🎮',
        title: '遊戲與活動',
        description: '透過配對、分類、迷宮、賓果等遊戲鞏固所學內容。',
        duration: '15 分鐘',
        activities: 4
      },
      {
        id: 'market',
        number: 5,
        icon: '🏪',
        title: '模擬市場',
        description: '完整的角色扮演購物體驗，練習所有對話和詞彙。',
        duration: '20 分鐘',
        activities: 1
      },
      {
        id: 'review',
        number: 6,
        icon: '📝',
        title: '回顧與反思',
        description: '回顧學習內容，完成反思問題，整理學習心得。',
        duration: '10 分鐘',
        activities: 3
      }
    ];

    // 選中的單元
    let selectedUnits = [];

    // LTI session 資料
    let ltiSession = null;
    let deepLinkSettings = null;

    // 初始化
    function init() {
      // 從 URL 取得 session ID
      const urlParams = new URLSearchParams(window.location.search);
      const sessionId = urlParams.get('session');

      // 從 localStorage 取得 LTI session
      const sessionStr = localStorage.getItem('lti_session');
      if (sessionStr) {
        try {
          ltiSession = JSON.parse(sessionStr);
        } catch (e) {
          console.error('Failed to parse LTI session:', e);
        }
      }

      // 渲染單元
      renderUnits();
    }

    // 渲染單元卡片
    function renderUnits() {
      const grid = document.getElementById('unitsGrid');
      grid.innerHTML = units.map(unit => `
        <div class="unit-card" data-unit-id="${unit.id}" onclick="toggleUnit('${unit.id}')">
          <div class="checkbox"></div>
          <div class="unit-icon">${unit.icon}</div>
          <div class="unit-title">第 ${unit.number} 單元：${unit.title}</div>
          <div class="unit-description">${unit.description}</div>
          <div class="unit-meta">
            <span>⏱️ ${unit.duration}</span>
            <span>📚 ${unit.activities} 個活動</span>
          </div>
        </div>
      `).join('');
    }

    // 切換單元選擇
    function toggleUnit(unitId) {
      const card = document.querySelector(`[data-unit-id="${unitId}"]`);
      const index = selectedUnits.indexOf(unitId);

      if (index > -1) {
        selectedUnits.splice(index, 1);
        card.classList.remove('selected');
      } else {
        selectedUnits.push(unitId);
        card.classList.add('selected');
      }

      updateUI();
    }

    // 更新 UI
    function updateUI() {
      document.getElementById('selectedCount').textContent = selectedUnits.length;
      document.getElementById('submitBtn').disabled = selectedUnits.length === 0;
    }

    // 取消
    function handleCancel() {
      if (window.opener) {
        window.close();
      } else if (window.parent !== window) {
        window.parent.postMessage({ type: 'lti_deep_linking_cancel' }, '*');
      } else {
        window.history.back();
      }
    }

    // 提交選擇
    async function handleSubmit() {
      if (selectedUnits.length === 0) return;

      const loadingOverlay = document.getElementById('loadingOverlay');
      loadingOverlay.classList.add('active');

      try {
        // 建立 content items
        const contentItems = selectedUnits.map(unitId => {
          const unit = units.find(u => u.id === unitId);
          const baseUrl = window.location.origin;

          return {
            type: 'ltiResourceLink',
            title: `${unit.icon} ${unit.title}`,
            text: unit.description,
            url: `${baseUrl}/unit-${unit.number}.html`,
            icon: {
              url: `${baseUrl}/assets/icons/${unit.id}.png`,
              width: 64,
              height: 64
            },
            custom: {
              unit: unit.number.toString(),
              unit_id: unit.id
            },
            lineItem: {
              scoreMaximum: 100,
              label: `金門語教材 - ${unit.title}`,
              tag: unit.id
            }
          };
        });

        // 建立 Deep Linking Response JWT
        // 簡化實作：直接提交表單到 Platform
        const platformReturnUrl = ltiSession?.deepLinkSettings?.deep_link_return_url ||
          'http://localhost:3002/api/lti/dl/callback';

        // 建立回應 payload
        const responsePayload = {
          iss: window.location.origin,
          aud: ltiSession?.platformIss || 'https://beyondbridge.edu',
          iat: Math.floor(Date.now() / 1000),
          exp: Math.floor(Date.now() / 1000) + 3600,
          nonce: Math.random().toString(36).substring(2),
          'https://purl.imsglobal.org/spec/lti/claim/message_type': 'LtiDeepLinkingResponse',
          'https://purl.imsglobal.org/spec/lti/claim/version': '1.3.0',
          'https://purl.imsglobal.org/spec/lti-dl/claim/content_items': contentItems,
          'https://purl.imsglobal.org/spec/lti-dl/claim/data': JSON.stringify({
            courseId: ltiSession?.context?.id || 'default_course',
            toolId: 'kinmen-tool'
          })
        };

        // 簡化：使用 Base64 編碼（非正式 JWT，僅用於演示）
        const header = btoa(JSON.stringify({ alg: 'none', typ: 'JWT' }));
        const payload = btoa(JSON.stringify(responsePayload));
        const simpleJwt = `${header}.${payload}.`;

        // 提交到 Platform
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = platformReturnUrl;

        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'JWT';
        input.value = simpleJwt;
        form.appendChild(input);

        document.body.appendChild(form);
        form.submit();

      } catch (error) {
        console.error('Submit error:', error);
        loadingOverlay.classList.remove('active');
        alert('提交失敗，請重試');
      }
    }

    // 頁面載入時初始化
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
